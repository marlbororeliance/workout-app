<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筋トレ & ダイエット管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:-apple-system; background:#f2f2f7; padding:20px; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:20px; }
input, select, button {
  width:100%; padding:10px; margin-top:8px;
  border-radius:8px; border:1px solid #ddd;
}
button { background:black; color:white; border:none; }
h1 { font-size:22px; }
ul { padding-left:20px; }
</style>
</head>
<body>

<h1>筋トレ & ダイエット管理</h1>

<div class="card">
<h3>体重・体脂肪 記録</h3>
<input type="number" id="weight" placeholder="体重 (kg)">
<input type="number" id="fat" placeholder="体脂肪率 (%)">
<button onclick="saveBody()">保存</button>
</div>

<div class="card">
<h3>トレーニング記録</h3>
<input type="text" id="exercise" placeholder="種目名">
<input type="number" id="liftWeight" placeholder="重量 (kg)">
<input type="number" id="reps" placeholder="回数">
<input type="number" id="sets" placeholder="セット数">
<button onclick="saveWorkout()">保存</button>
<button onclick="exportCSV()">CSV書き出し</button>
<p id="maxDisplay"></p>

<select id="exerciseSelect" onchange="drawExerciseChart()">
<option value="">種目を選択</option>
</select>

<canvas id="exerciseChart"></canvas>
<ul id="workoutList"></ul>
</div>

<div class="card">
<h3>体重・体脂肪 推移</h3>
<canvas id="bodyChart"></canvas>
</div>

<script>
let bodyRecords = JSON.parse(localStorage.getItem("bodyRecords")) || [];
let workouts = JSON.parse(localStorage.getItem("workouts")) || [];

function saveBody(){
  const weight = document.getElementById("weight").value;
  const fat = document.getElementById("fat").value;
  const date = new Date().toLocaleDateString("ja-JP");

  if(!weight) return alert("体重を入力");

  bodyRecords.push({date, weight:+weight, fat:+fat});
  localStorage.setItem("bodyRecords", JSON.stringify(bodyRecords));
  drawBodyChart();
}

function saveWorkout(){
  const exercise = document.getElementById("exercise").value;
  const liftWeight = +document.getElementById("liftWeight").value;
  const reps = document.getElementById("reps").value;
  const sets = document.getElementById("sets").value;
  const date = new Date().toLocaleDateString("ja-JP");

  if(!exercise) return alert("種目入力");

  workouts.push({date, exercise, liftWeight, reps, sets});
  localStorage.setItem("workouts", JSON.stringify(workouts));

  updateMax();
  populateSelect();
  displayWorkouts();
}

function updateMax(){
  let maxMap = {};
  workouts.forEach(w=>{
    if(!maxMap[w.exercise] || w.liftWeight > maxMap[w.exercise]){
      maxMap[w.exercise] = w.liftWeight;
    }
  });
  let text="";
  for(let ex in maxMap){
    text += `${ex} MAX: ${maxMap[ex]}kg<br>`;
  }
  document.getElementById("maxDisplay").innerHTML=text;
}

function populateSelect(){
  const select = document.getElementById("exerciseSelect");
  select.innerHTML='<option value="">種目選択</option>';
  [...new Set(workouts.map(w=>w.exercise))].forEach(ex=>{
    let option=document.createElement("option");
    option.value=ex;
    option.textContent=ex;
    select.appendChild(option);
  });
}

function drawExerciseChart(){
  const selected=document.getElementById("exerciseSelect").value;
  if(!selected) return;
  const data=workouts.filter(w=>w.exercise===selected);
  const labels=data.map(w=>w.date);
  const weights=data.map(w=>w.liftWeight);

  new Chart(document.getElementById("exerciseChart"),{
    type:'line',
    data:{labels,
      datasets:[{label:selected,data:weights,borderWidth:2}]
    },
    options:{responsive:true}
  });
}

function drawBodyChart(){
  const labels=bodyRecords.map(r=>r.date);
  const weights=bodyRecords.map(r=>r.weight);
  const fats=bodyRecords.map(r=>r.fat);

  new Chart(document.getElementById("bodyChart"),{
    type:'line',
    data:{labels,
      datasets:[
        {label:'体重',data:weights,borderWidth:2},
        {label:'体脂肪率',data:fats,borderWidth:2}
      ]
    },
    options:{responsive:true}
  });
}

function displayWorkouts(){
  const list=document.getElementById("workoutList");
  list.innerHTML="";
  workouts.slice().reverse().forEach(w=>{
    const li=document.createElement("li");
    li.textContent=`${w.date} ${w.exercise} ${w.liftWeight}kg × ${w.reps} × ${w.sets}`;
    list.appendChild(li);
  });
}

drawBodyChart();
updateMax();
populateSelect();
displayWorkouts();
function exportCSV() {
  const data = JSON.parse(localStorage.getItem("workoutData")) || [];
  if (data.length === 0) {
    alert("データがありません");
    return;
  }

  let csv = "日付,体重,体脂肪,種目,重量,回数\n";

  data.forEach(d => {
    csv += `${d.date},${d.weight},${d.bodyfat},${d.exercise},${d.weightLifted},${d.reps}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "workout_data.csv";
  a.click();
}
</script>

</body>
</html>
